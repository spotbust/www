<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotbust - Gigs Admin CMS</title>
    <style>
        :root {
            --black: #0a0a0a;
            --white: #f0ede6;
            --neon: #c6ff00;
            --red: #ff3333;
            --grey: #1a1a1a;
            --font-marker: 'Permanent Marker', cursive;
            --font-mono: 'Space Mono', monospace;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-mono);
            background: var(--black);
            color: var(--white);
            min-height: 100vh;
            margin: 10vw;
        }

        /* ============ LOGIN SCREEN ============ */
        .login-screen {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, var(--black) 0%, var(--grey) 100%);
            padding: 20px;
        }

        .login-container {
            background: var(--grey);
            border: 3px solid var(--neon);
            border-radius: 8px;
            padding: 40px;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 0 20px rgba(198, 255, 0, 0.3);
        }

        .login-container h1 {
            font-size: 32px;
            margin-bottom: 30px;
            text-align: center;
            color: var(--neon);
            font-family: var(--font-marker);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: #aaa;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 3px solid var(--neon);
            background: var(--black);
            color: var(--white);
            border-radius: 4px;
            font-family: var(--font-mono);
            font-size: 14px;
        }

        .form-group input:focus {
            outline: none;
            box-shadow: 0 0 10px rgba(198, 255, 0, 0.5);
        }

        .form-group small {
            display: block;
            margin-top: 6px;
            font-size: 12px;
            color: #888;
        }

        .login-btn {
            width: 100%;
            padding: 12px;
            background: var(--neon);
            border: 3px solid var(--neon);
            color: var(--black);
            font-weight: bold;
            font-size: 16px;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s;
            font-family: var(--font-marker);
            text-transform: uppercase;
            letter-spacing: 1px;
            transform: rotate(-1deg);
        }

        .login-btn:hover {
            background: transparent;
            color: var(--neon);
            transform: rotate(1deg);
        }

        .login-btn:active {
            transform: rotate(-1deg);
        }

        .login-error {
            color: var(--red);
            margin-bottom: 20px;
            padding: 10px;
            border-left: 3px solid var(--red);
            display: none;
        }

        .login-error.show {
            display: block;
        }

        /* ============ ADMIN PANEL ============ */
        .admin-screen {
            display: none;
            min-height: 100vh;
            padding: 20px;
        }

        .admin-screen.active {
            display: block;
        }

        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            border-bottom: 3px solid var(--neon);
            padding-bottom: 20px;
        }

        .admin-header h1 {
            font-size: 28px;
            font-family: var(--font-marker);
            color: var(--neon);
        }

        .logout-btn {
            padding: 8px 16px;
            background: var(--neon);
            border: 3px solid var(--neon);
            color: var(--black);
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            font-family: var(--font-marker);
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s;
            transform: rotate(-1deg);
        }

        .logout-btn:hover {
            background: transparent;
            color: var(--neon);
            transform: rotate(1deg);
        }

        .admin-controls {
            margin-bottom: 30px;
            display: flex;
            gap: 10px;
        }

        .add-gig-btn {
            padding: 12px 20px;
            background: var(--neon);
            border: 3px solid var(--neon);
            color: var(--black);
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            font-family: var(--font-marker);
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s;
            transform: rotate(-1deg);
        }

        .add-gig-btn:hover {
            background: transparent;
            color: var(--neon);
            transform: rotate(1deg);
        }

        .add-gig-btn:active {
            transform: rotate(-1deg);
        }

        .status-message {
            padding: 12px 20px;
            border-radius: 4px;
            font-size: 14px;
            margin-left: auto;
            min-height: 44px;
            display: flex;
            align-items: center;
            font-family: var(--font-mono);
        }

        .status-message.success {
            background: rgba(76, 175, 80, 0.2);
            border-left: 3px solid #4caf50;
            color: #4caf50;
        }

        .status-message.error {
            background: rgba(255, 51, 51, 0.2);
            border-left: 3px solid var(--red);
            color: var(--red);
        }

        .status-message.loading {
            background: rgba(198, 255, 0, 0.2);
            border-left: 3px solid var(--neon);
            color: var(--neon);
        }

        .status-message.hidden {
            display: none;
        }

        /* ============ GIGS TABLE ============ */
        .gigs-table-container {
            overflow-x: auto;
        }

        .gigs-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
        }

        .gigs-table thead {
            background: var(--grey);
            border-bottom: 3px solid var(--neon);
        }

        .gigs-table th {
            padding: 15px;
            text-align: left;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--neon);
            font-weight: bold;
            font-family: var(--font-marker);
        }

        .gigs-table td {
            padding: 15px;
            border-bottom: 1px solid var(--grey);
            font-size: 14px;
            font-family: var(--font-mono);
        }

        .gigs-table tbody tr {
            transition: background 0.2s;
        }

        .gigs-table tbody tr:hover {
            background: rgba(198, 255, 0, 0.1);
        }

        .gigs-table .date {
            color: var(--neon);
            font-weight: bold;
            font-family: var(--font-marker);
        }

        .gigs-table .city {
            color: var(--white);
        }

        .gigs-table .venue {
            color: var(--white);
            font-weight: 600;
        }

        .gigs-table .time {
            color: #888;
        }

        .table-actions {
            display: flex;
            gap: 8px;
        }

        .edit-btn,
        .delete-btn {
            padding: 6px 12px;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            font-size: 12px;
            font-family: var(--font-marker);
            text-transform: uppercase;
            font-weight: bold;
            transition: all 0.2s;
        }

        .edit-btn {
            background: var(--neon);
            color: var(--black);
            border: 3px solid var(--neon);
            transform: rotate(-1deg);
        }

        .edit-btn:hover {
            background: transparent;
            color: var(--neon);
            transform: rotate(1deg);
        }

        .delete-btn {
            background: var(--red);
            color: var(--white);
            border: 3px solid var(--red);
            transform: rotate(-1deg);
        }

        .delete-btn:hover {
            background: transparent;
            color: var(--red);
            transform: rotate(1deg);
        }

        .empty-message {
            text-align: center;
            padding: 40px 20px;
            color: #888;
            font-size: 14px;
        }

        /* ============ MODAL ============ */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(10, 10, 10, 0.8);
            z-index: 100;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: var(--grey);
            border: 3px solid var(--neon);
            border-radius: 8px;
            padding: 30px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 0 30px rgba(198, 255, 0, 0.3);
        }

        .modal h2 {
            font-size: 24px;
            margin-bottom: 20px;
            color: var(--neon);
            font-family: var(--font-marker);
        }

        .modal-form-group {
            margin-bottom: 15px;
        }

        .modal-form-group label {
            display: block;
            margin-bottom: 6px;
            font-size: 12px;
            color: #aaa;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-family: var(--font-mono);
        }

        .modal-form-group input,
        .modal-form-group textarea {
            width: 100%;
            padding: 10px;
            border: 3px solid var(--neon);
            background: var(--black);
            color: var(--white);
            border-radius: 4px;
            font-family: var(--font-mono);
            font-size: 13px;
        }

        .modal-form-group textarea {
            resize: vertical;
            min-height: 60px;
        }

        .modal-form-group input:focus,
        .modal-form-group textarea:focus {
            outline: none;
            box-shadow: 0 0 10px rgba(198, 255, 0, 0.5);
        }

        .modal-actions {
            display: flex;
            gap: 10px;
            margin-top: 25px;
        }

        .modal-actions button {
            flex: 1;
            padding: 12px;
            border: 3px solid;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-family: var(--font-marker);
            font-size: 14px;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .save-btn {
            background: var(--neon);
            border-color: var(--neon);
            color: var(--black);
            transform: rotate(-1deg);
        }

        .save-btn:hover {
            background: transparent;
            color: var(--neon);
            transform: rotate(1deg);
        }

        .cancel-btn {
            background: transparent;
            border-color: var(--white);
            color: var(--white);
        }

        .cancel-btn:hover {
            background: var(--white);
            color: var(--black);
        }

        .modal-error {
            color: var(--red);
            padding: 10px;
            margin-bottom: 15px;
            border-left: 3px solid var(--red);
            font-size: 12px;
            display: none;
            font-family: var(--font-mono);
        }

        .modal-error.show {
            display: block;
        }

        /* ============ CONFIRM MODAL ============ */
        .confirm-modal {
            max-width: 400px;
        }

        .confirm-modal .modal-actions {
            flex-direction: row-reverse;
        }

        .confirm-modal p {
            color: #aaa;
            margin-bottom: 20px;
            font-size: 14px;
            line-height: 1.5;
            font-family: var(--font-mono);
        }

        .delete-confirm-btn {
            background: var(--red);
            border-color: var(--red);
            color: var(--white);
            transform: rotate(-1deg);
        }

        .delete-confirm-btn:hover {
            background: transparent;
            color: var(--red);
            transform: rotate(1deg);
        }

        /* ============ RESPONSIVE ============ */
        @media (max-width: 768px) {
            body {
                margin: 5vw;
            }

            .admin-header {
                flex-direction: column;
                gap: 15px;
                align-items: flex-start;
            }

            .admin-controls {
                flex-direction: column;
            }

            .add-gig-btn,
            .logout-btn {
                width: 100%;
            }

            .status-message {
                margin-left: 0;
                margin-top: 10px;
            }

            .gigs-table {
                font-size: 12px;
            }

            .gigs-table th,
            .gigs-table td {
                padding: 10px;
            }

            .table-actions {
                flex-direction: column;
            }

            .edit-btn,
            .delete-btn {
                width: 100%;
            }

            .modal {
                padding: 20px;
            }

            .login-container {
                padding: 20px;
            }
        }

        /* ============ UTILITIES ============ */
        .hidden {
            display: none !important;
        }

        .loading {
            opacity: 0.6;
            pointer-events: none;
        }
    </style>
</head>

<body>
    <!-- LOGIN SCREEN -->
    <div class="login-screen" id="loginScreen">
        <div class="login-container">
            <h1>SPOTBUST</h1>
            <div class="login-error" id="loginError"></div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="password">Admin Password</label>
                    <input type="password" id="password" placeholder="Passwort eingeben" required
                        autocomplete="current-password">
                </div>

                <button type="submit" class="login-btn">LOGIN</button>
            </form>
        </div>
    </div>

    <!-- ADMIN SCREEN -->
    <div class="admin-screen" id="adminScreen">
        <div class="admin-header">
            <h1>Gigs verwalten</h1>
            <button class="logout-btn" id="logoutBtn">LOGOUT</button>
        </div>

        <div class="admin-controls">
            <button class="add-gig-btn" id="addGigBtn">+ Neuer Gig</button>
            <div class="status-message hidden" id="statusMessage"></div>
        </div>

        <div class="gigs-table-container">
            <table class="gigs-table">
                <thead>
                    <tr>
                        <th>Datum</th>
                        <th>Stadt</th>
                        <th>Venue</th>
                        <th>Uhrzeit</th>
                        <th>Info</th>
                        <th style="width: 140px;">Aktionen</th>
                    </tr>
                </thead>
                <tbody id="gigsTableBody">
                    <tr>
                        <td colspan="6" class="empty-message">Lade Gigs...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- EDIT MODAL -->
    <div class="modal-overlay" id="gigModal">
        <div class="modal">
            <h2 id="gigModalTitle">Neuer Gig</h2>
            <div class="modal-error" id="gigModalError"></div>

            <form id="gigForm">
                <div class="modal-form-group">
                    <label for="gigDate">Datum *</label>
                    <input type="date" id="gigDate" required>
                </div>

                <div class="modal-form-group">
                    <label for="gigCity">Stadt *</label>
                    <input type="text" id="gigCity" placeholder="z.B. Berlin" required>
                </div>

                <div class="modal-form-group">
                    <label for="gigVenue">Venue *</label>
                    <input type="text" id="gigVenue" placeholder="z.B. Lido Club" required>
                </div>

                <div class="modal-form-group">
                    <label for="gigTime">Uhrzeit *</label>
                    <input type="time" id="gigTime" placeholder="HH:MM" required>
                </div>

                <div class="modal-form-group">
                    <label for="gigInfo">Info (optional)</label>
                    <textarea id="gigInfo" placeholder="z.B. Gästeliste, Eintritt, etc."></textarea>
                </div>

                <div class="modal-actions">
                    <button type="submit" class="save-btn">SPEICHERN</button>
                    <button type="button" class="cancel-btn" id="cancelGigBtn">ABBRECHEN</button>
                </div>
            </form>
        </div>
    </div>

    <!-- DELETE CONFIRM MODAL -->
    <div class="modal-overlay" id="deleteConfirmModal">
        <div class="modal confirm-modal">
            <h2>Gig löschen?</h2>
            <p id="deleteConfirmText">Sind Sie sicher, dass Sie diesen Gig löschen möchten? Diese Aktion kann nicht
                rückgängig gemacht werden.</p>
            <div class="modal-actions">
                <button type="button" class="delete-confirm-btn" id="confirmDeleteBtn">LÖSCHEN</button>
                <button type="button" class="cancel-btn" id="cancelDeleteBtn">ABBRECHEN</button>
            </div>
        </div>
    </div>

    <script>
        // ============ CONFIG ============
        const CONFIG = {
            GIGS_JSON_URL: '/gigs.json',
            AUTHENTICATE_ENDPOINT: '/.netlify/functions/authenticate',
            SAVE_GIG_ENDPOINT: '/.netlify/functions/save-gig',
            STORAGE_AUTH_KEY: 'spotbust_authenticated',
            STORAGE_TOKEN_KEY: 'spotbust_auth_token'
        };

        // ============ STATE ============
        let state = {
            authenticated: false,
            authToken: null,
            gigs: [],
            editingGigIndex: null,
            deletingGigIndex: null
        };

        // ============ DOM ELEMENTS ============
        const loginScreen = document.getElementById('loginScreen');
        const adminScreen = document.getElementById('adminScreen');
        const loginForm = document.getElementById('loginForm');
        const passwordInput = document.getElementById('password');
        const loginError = document.getElementById('loginError');
        const logoutBtn = document.getElementById('logoutBtn');
        const addGigBtn = document.getElementById('addGigBtn');
        const gigModal = document.getElementById('gigModal');
        const gigForm = document.getElementById('gigForm');
        const gigModalTitle = document.getElementById('gigModalTitle');
        const gigModalError = document.getElementById('gigModalError');
        const cancelGigBtn = document.getElementById('cancelGigBtn');
        const deleteConfirmModal = document.getElementById('deleteConfirmModal');
        const confirmDeleteBtn = document.getElementById('confirmDeleteBtn');
        const cancelDeleteBtn = document.getElementById('cancelDeleteBtn');
        const gigsTableBody = document.getElementById('gigsTableBody');
        const statusMessage = document.getElementById('statusMessage');

        // ============ FORM INPUTS ============
        const gigDateInput = document.getElementById('gigDate');
        const gigCityInput = document.getElementById('gigCity');
        const gigVenueInput = document.getElementById('gigVenue');
        const gigTimeInput = document.getElementById('gigTime');
        const gigInfoInput = document.getElementById('gigInfo');

        // ============ INITIALIZATION ============
        function init() {
            restoreAuth();

            if (state.authenticated) {
                showAdminScreen();
                loadGigs();
            } else {
                showLoginScreen();
            }

            attachEventListeners();
        }

        function attachEventListeners() {
            loginForm.addEventListener('submit', handleLogin);
            logoutBtn.addEventListener('click', handleLogout);
            addGigBtn.addEventListener('click', openAddGigModal);
            gigForm.addEventListener('submit', handleSaveGig);
            cancelGigBtn.addEventListener('click', closeGigModal);
            deleteConfirmModal.addEventListener('click', (e) => {
                if (e.target === deleteConfirmModal) closeDeleteConfirmModal();
            });
            confirmDeleteBtn.addEventListener('click', handleConfirmDelete);
            cancelDeleteBtn.addEventListener('click', closeDeleteConfirmModal);
            gigModal.addEventListener('click', (e) => {
                if (e.target === gigModal) closeGigModal();
            });
        }

        // ============ AUTHENTICATION ============
        function handleLogin(e) {
            e.preventDefault();
            const password = passwordInput.value;

            if (!password) {
                showLoginError('Passwort erforderlich');
                return;
            }

            authenticateUser(password);
        }

        async function authenticateUser(password) {
            try {
                showLoginError('');
                
                const response = await fetch(CONFIG.AUTHENTICATE_ENDPOINT, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ password })
                });

                const data = await response.json();

                if (!response.ok) {
                    showLoginError(data.error || 'Authentifizierung fehlgeschlagen');
                    return;
                }

                // Store token
                state.authenticated = true;
                state.authToken = data.token;
                localStorage.setItem(CONFIG.STORAGE_AUTH_KEY, 'true');
                localStorage.setItem(CONFIG.STORAGE_TOKEN_KEY, data.token);

                passwordInput.value = '';
                showAdminScreen();
                loadGigs();
            } catch (error) {
                console.error('Auth error:', error);
                showLoginError('Verbindungsfehler: ' + error.message);
            }
        }

        function handleLogout() {
            state.authenticated = false;
            state.authToken = null;
            state.gigs = [];
            localStorage.removeItem(CONFIG.STORAGE_AUTH_KEY);
            localStorage.removeItem(CONFIG.STORAGE_TOKEN_KEY);

            passwordInput.value = '';
            showLoginScreen();
        }

        function restoreAuth() {
            const authenticated = localStorage.getItem(CONFIG.STORAGE_AUTH_KEY);
            const token = localStorage.getItem(CONFIG.STORAGE_TOKEN_KEY);

            if (authenticated && token) {
                state.authenticated = true;
                state.authToken = token;
            }
        }

        function showLoginError(message) {
            loginError.textContent = message;
            loginError.classList.add('show');
        }

        // ============ SCREEN TRANSITIONS ============
        function showLoginScreen() {
            loginScreen.style.display = 'flex';
            adminScreen.classList.remove('active');
        }

        function showAdminScreen() {
            loginScreen.style.display = 'none';
            adminScreen.classList.add('active');
        }

        // ============ LOAD GIGS ============
        async function loadGigs() {
            try {
                showStatus('Lade Gigs...', 'loading');

                const response = await fetch(CONFIG.GIGS_JSON_URL);

                if (!response.ok) {
                    throw new Error(`Fehler beim Laden: ${response.status}`);
                }

                state.gigs = await response.json();
                state.gigs.sort((a, b) => new Date(a.datum) - new Date(b.datum));

                renderGigsTable();
                showStatus('✓ Gigs geladen', 'success', 3000);
            } catch (error) {
                console.error('Load error:', error);
                showStatus(`Fehler beim Laden: ${error.message}`, 'error');
                gigsTableBody.innerHTML = `<tr><td colspan="6" class="empty-message">Fehler beim Laden der Gigs. Versuche später erneut.</td></tr>`;
            }
        }

        // ============ RENDER TABLE ============
        function renderGigsTable() {
            if (state.gigs.length === 0) {
                gigsTableBody.innerHTML = '<tr><td colspan="6" class="empty-message">Keine Gigs vorhanden. Fügen Sie einen neuen Gig hinzu.</td></tr>';
                return;
            }

            gigsTableBody.innerHTML = state.gigs.map((gig, index) => {
                const date = new Date(gig.datum + 'T00:00:00');
                const formattedDate = date.toLocaleDateString('de-DE', {
                    day: '2-digit',
                    month: 'short',
                    year: 'numeric',
                    weekday: 'short'
                }).toUpperCase();

                return `
                    <tr>
                        <td class="date">${formattedDate}</td>
                        <td class="city">${escapeHtml(gig.stadt)}</td>
                        <td class="venue">${escapeHtml(gig.venue)}</td>
                        <td class="time">${gig.uhrzeit}</td>
                        <td>${gig.info ? escapeHtml(gig.info) : '—'}</td>
                        <td>
                            <div class="table-actions">
                                <button class="edit-btn" onclick="openEditGigModal(${index})">EDIT</button>
                                <button class="delete-btn" onclick="openDeleteConfirmModal(${index})">DELETE</button>
                            </div>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        // ============ MODAL OPERATIONS ============
        function openAddGigModal() {
            state.editingGigIndex = null;
            gigModalTitle.textContent = 'Neuer Gig';
            gigForm.reset();
            gigModalError.classList.remove('show');
            gigModal.classList.add('active');
            gigDateInput.focus();
        }

        function openEditGigModal(index) {
            state.editingGigIndex = index;
            const gig = state.gigs[index];

            gigModalTitle.textContent = 'Gig bearbeiten';
            gigDateInput.value = gig.datum;
            gigCityInput.value = gig.stadt;
            gigVenueInput.value = gig.venue;
            gigTimeInput.value = gig.uhrzeit;
            gigInfoInput.value = gig.info || '';
            gigModalError.classList.remove('show');

            gigModal.classList.add('active');
        }

        function closeGigModal() {
            gigModal.classList.remove('active');
            state.editingGigIndex = null;
            gigForm.reset();
        }

        function openDeleteConfirmModal(index) {
            state.deletingGigIndex = index;
            const gig = state.gigs[index];
            const dateStr = new Date(gig.datum + 'T00:00:00').toLocaleDateString('de-DE', {
                day: '2-digit',
                month: 'long',
                year: 'numeric'
            });
            document.getElementById('deleteConfirmText').textContent =
                `Wirklich "${escapeHtml(gig.stadt)} – ${escapeHtml(gig.venue)}" (${dateStr}) löschen?`;
            deleteConfirmModal.classList.add('active');
        }

        function closeDeleteConfirmModal() {
            deleteConfirmModal.classList.remove('active');
            state.deletingGigIndex = null;
        }

        // ============ SAVE GIG ============
        async function handleSaveGig(e) {
            e.preventDefault();

            const date = gigDateInput.value;
            const city = gigCityInput.value.trim();
            const venue = gigVenueInput.value.trim();
            const time = gigTimeInput.value;
            const info = gigInfoInput.value.trim();

            // Validation
            if (!date || !city || !venue || !time) {
                showGigModalError('Alle Felder außer "Info" sind erforderlich');
                return;
            }

            const newGig = {
                datum: date,
                stadt: city,
                venue: venue,
                uhrzeit: time
            };

            if (info) {
                newGig.info = info;
            }

            // Update or add
            if (state.editingGigIndex !== null) {
                state.gigs[state.editingGigIndex] = newGig;
            } else {
                state.gigs.push(newGig);
            }

            // Sort by date
            state.gigs.sort((a, b) => new Date(a.datum) - new Date(b.datum));

            // Save to GitHub
            await saveGigsToGitHub();

            closeGigModal();
        }

        async function handleConfirmDelete() {
            if (state.deletingGigIndex === null) return;

            state.gigs.splice(state.deletingGigIndex, 1);
            await saveGigsToGitHub();

            closeDeleteConfirmModal();
        }

        // ============ SAVE TO NETLIFY ENDPOINT ============
        async function saveGigsToGitHub() {
            try {
                showStatus('Speichere Änderungen...', 'loading');

                // Sort gigs by date before sending
                const sortedGigs = state.gigs.sort((a, b) => new Date(a.datum) - new Date(b.datum));

                // Send to Netlify function with token
                const response = await fetch(CONFIG.SAVE_GIG_ENDPOINT, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        token: state.authToken,
                        gigs: sortedGigs
                    })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || `Fehler: ${response.status}`);
                }

                renderGigsTable();
                showStatus('✓ Erfolgreich gespeichert!', 'success', 3000);
            } catch (error) {
                console.error('Save error:', error);
                showGigModalError(`Fehler beim Speichern: ${error.message}`);
                showStatus(`Fehler: ${error.message}`, 'error');
            }
        }

        // ============ UI HELPERS ============
        function showStatus(message, type = 'info', duration = 0) {
            statusMessage.textContent = message;
            statusMessage.className = `status-message ${type}`;

            if (duration > 0) {
                setTimeout(() => {
                    statusMessage.classList.add('hidden');
                }, duration);
            }
        }

        function showGigModalError(message) {
            gigModalError.textContent = message;
            gigModalError.classList.add('show');
        }

        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        // ============ START ============
        init();
    </script>
</body>

</html>
