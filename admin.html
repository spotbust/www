<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotbust - Gigs Admin CMS</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Space Mono', monospace;
            background: #0a0a0a;
            color: #fff;
            min-height: 100vh;
        }

        /* ============ LOGIN SCREEN ============ */
        .login-screen {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
            padding: 20px;
        }

        .login-container {
            background: #1a1a2e;
            border: 2px solid #ff6b35;
            border-radius: 8px;
            padding: 40px;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 0 20px rgba(255, 107, 53, 0.3);
        }

        .login-container h1 {
            font-size: 32px;
            margin-bottom: 30px;
            text-align: center;
            color: #ff6b35;
            font-family: 'Permanent Marker', cursive;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: #aaa;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ff6b35;
            background: #0a0a0a;
            color: #fff;
            border-radius: 4px;
            font-family: 'Space Mono', monospace;
            font-size: 14px;
        }

        .form-group input:focus {
            outline: none;
            box-shadow: 0 0 10px rgba(255, 107, 53, 0.5);
        }

        .form-group small {
            display: block;
            margin-top: 6px;
            font-size: 12px;
            color: #888;
        }

        .login-btn {
            width: 100%;
            padding: 12px;
            background: #ff6b35;
            border: none;
            color: #000;
            font-weight: bold;
            font-size: 16px;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Space Mono', monospace;
        }

        .login-btn:hover {
            background: #ff8555;
            transform: translateY(-2px);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .login-error {
            color: #ff4444;
            margin-bottom: 20px;
            padding: 10px;
            border-left: 3px solid #ff4444;
            display: none;
        }

        .login-error.show {
            display: block;
        }

        /* ============ ADMIN PANEL ============ */
        .admin-screen {
            display: none;
            min-height: 100vh;
            padding: 20px;
        }

        .admin-screen.active {
            display: block;
        }

        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            border-bottom: 2px solid #ff6b35;
            padding-bottom: 20px;
        }

        .admin-header h1 {
            font-size: 28px;
            font-family: 'Permanent Marker', cursive;
            color: #ff6b35;
        }

        .logout-btn {
            padding: 8px 16px;
            background: #ff6b35;
            border: none;
            color: #000;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            font-family: 'Space Mono', monospace;
            transition: all 0.3s;
        }

        .logout-btn:hover {
            background: #ff8555;
        }

        .admin-controls {
            margin-bottom: 30px;
            display: flex;
            gap: 10px;
        }

        .add-gig-btn {
            padding: 12px 20px;
            background: #ff6b35;
            border: none;
            color: #000;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            font-family: 'Space Mono', monospace;
            font-size: 14px;
            transition: all 0.3s;
        }

        .add-gig-btn:hover {
            background: #ff8555;
            transform: translateY(-2px);
        }

        .status-message {
            padding: 12px 20px;
            border-radius: 4px;
            font-size: 14px;
            margin-left: auto;
            min-height: 44px;
            display: flex;
            align-items: center;
        }

        .status-message.success {
            background: rgba(76, 175, 80, 0.2);
            border-left: 3px solid #4caf50;
            color: #4caf50;
        }

        .status-message.error {
            background: rgba(244, 67, 54, 0.2);
            border-left: 3px solid #f44336;
            color: #f44336;
        }

        .status-message.loading {
            background: rgba(255, 107, 53, 0.2);
            border-left: 3px solid #ff6b35;
            color: #ff6b35;
        }

        .status-message.hidden {
            display: none;
        }

        /* ============ GIGS TABLE ============ */
        .gigs-table-container {
            overflow-x: auto;
        }

        .gigs-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
        }

        .gigs-table thead {
            background: #1a1a2e;
            border-bottom: 2px solid #ff6b35;
        }

        .gigs-table th {
            padding: 15px;
            text-align: left;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #ff6b35;
            font-weight: bold;
        }

        .gigs-table td {
            padding: 15px;
            border-bottom: 1px solid #333;
            font-size: 14px;
        }

        .gigs-table tbody tr {
            transition: background 0.2s;
        }

        .gigs-table tbody tr:hover {
            background: #1a1a2e;
        }

        .gigs-table .date {
            color: #ff6b35;
            font-weight: bold;
        }

        .gigs-table .city {
            color: #aaa;
        }

        .gigs-table .venue {
            color: #fff;
        }

        .gigs-table .time {
            color: #888;
        }

        .table-actions {
            display: flex;
            gap: 8px;
        }

        .edit-btn, .delete-btn {
            padding: 6px 12px;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            font-size: 12px;
            font-family: 'Space Mono', monospace;
            text-transform: uppercase;
            font-weight: bold;
            transition: all 0.2s;
        }

        .edit-btn {
            background: #ff6b35;
            color: #000;
        }

        .edit-btn:hover {
            background: #ff8555;
        }

        .delete-btn {
            background: #dc3545;
            color: #fff;
        }

        .delete-btn:hover {
            background: #ff4555;
        }

        .empty-message {
            text-align: center;
            padding: 40px 20px;
            color: #888;
            font-size: 14px;
        }

        /* ============ MODAL ============ */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 100;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: #1a1a2e;
            border: 2px solid #ff6b35;
            border-radius: 8px;
            padding: 30px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 0 30px rgba(255, 107, 53, 0.3);
        }

        .modal h2 {
            font-size: 24px;
            margin-bottom: 20px;
            color: #ff6b35;
            font-family: 'Permanent Marker', cursive;
        }

        .modal-form-group {
            margin-bottom: 15px;
        }

        .modal-form-group label {
            display: block;
            margin-bottom: 6px;
            font-size: 12px;
            color: #aaa;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .modal-form-group input, 
        .modal-form-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ff6b35;
            background: #0a0a0a;
            color: #fff;
            border-radius: 4px;
            font-family: 'Space Mono', monospace;
            font-size: 13px;
        }

        .modal-form-group textarea {
            resize: vertical;
            min-height: 60px;
        }

        .modal-form-group input:focus,
        .modal-form-group textarea:focus {
            outline: none;
            box-shadow: 0 0 10px rgba(255, 107, 53, 0.5);
        }

        .modal-actions {
            display: flex;
            gap: 10px;
            margin-top: 25px;
        }

        .modal-actions button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-family: 'Space Mono', monospace;
            font-size: 14px;
            transition: all 0.2s;
            text-transform: uppercase;
        }

        .save-btn {
            background: #ff6b35;
            color: #000;
        }

        .save-btn:hover {
            background: #ff8555;
        }

        .cancel-btn {
            background: #333;
            color: #fff;
        }

        .cancel-btn:hover {
            background: #444;
        }

        .modal-error {
            color: #ff4444;
            padding: 10px;
            margin-bottom: 15px;
            border-left: 3px solid #ff4444;
            font-size: 12px;
            display: none;
        }

        .modal-error.show {
            display: block;
        }

        /* ============ CONFIRM MODAL ============ */
        .confirm-modal {
            max-width: 400px;
        }

        .confirm-modal .modal-actions {
            flex-direction: row-reverse;
        }

        .confirm-modal p {
            color: #aaa;
            margin-bottom: 20px;
            font-size: 14px;
            line-height: 1.5;
        }

        .delete-confirm-btn {
            background: #dc3545;
            color: #fff;
        }

        .delete-confirm-btn:hover {
            background: #ff4555;
        }

        /* ============ RESPONSIVE ============ */
        @media (max-width: 768px) {
            .admin-header {
                flex-direction: column;
                gap: 15px;
                align-items: flex-start;
            }

            .admin-controls {
                flex-direction: column;
            }

            .add-gig-btn, .logout-btn {
                width: 100%;
            }

            .status-message {
                margin-left: 0;
                margin-top: 10px;
            }

            .gigs-table {
                font-size: 12px;
            }

            .gigs-table th,
            .gigs-table td {
                padding: 10px;
            }

            .table-actions {
                flex-direction: column;
            }

            .edit-btn, .delete-btn {
                width: 100%;
            }

            .modal {
                padding: 20px;
            }
        }

        /* ============ UTILITIES ============ */
        .hidden {
            display: none !important;
        }

        .loading {
            opacity: 0.6;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <!-- LOGIN SCREEN -->
    <div class="login-screen" id="loginScreen">
        <div class="login-container">
            <h1>SPOTBUST</h1>
            <div class="login-error" id="loginError"></div>
            
            <form id="loginForm">
                <div class="form-group">
                    <label for="password">Admin Password</label>
                    <input 
                        type="password" 
                        id="password" 
                        placeholder="Passwort eingeben" 
                        required
                        autocomplete="current-password"
                    >
                </div>

                <div class="form-group">
                    <label for="githubToken">GitHub Personal Access Token</label>
                    <input 
                        type="password" 
                        id="githubToken" 
                        placeholder="ghp_xxxxxxxxxxxxxxxxxxxx" 
                        required
                        autocomplete="off"
                    >
                    <small>Wird lokal gespeichert. <a href="https://github.com/settings/tokens/new?scopes=repo&description=Spotbust%20CMS" target="_blank" style="color: #ff6b35; text-decoration: none;">Token erstellen →</a></small>
                </div>

                <button type="submit" class="login-btn">LOGIN</button>
            </form>
        </div>
    </div>

    <!-- ADMIN SCREEN -->
    <div class="admin-screen" id="adminScreen">
        <div class="admin-header">
            <h1>Gigs verwalten</h1>
            <button class="logout-btn" id="logoutBtn">LOGOUT</button>
        </div>

        <div class="admin-controls">
            <button class="add-gig-btn" id="addGigBtn">+ Neuer Gig</button>
            <div class="status-message hidden" id="statusMessage"></div>
        </div>

        <div class="gigs-table-container">
            <table class="gigs-table">
                <thead>
                    <tr>
                        <th>Datum</th>
                        <th>Stadt</th>
                        <th>Venue</th>
                        <th>Uhrzeit</th>
                        <th>Info</th>
                        <th style="width: 140px;">Aktionen</th>
                    </tr>
                </thead>
                <tbody id="gigsTableBody">
                    <tr>
                        <td colspan="6" class="empty-message">Lade Gigs...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- EDIT MODAL -->
    <div class="modal-overlay" id="gigModal">
        <div class="modal">
            <h2 id="gigModalTitle">Neuer Gig</h2>
            <div class="modal-error" id="gigModalError"></div>
            
            <form id="gigForm">
                <div class="modal-form-group">
                    <label for="gigDate">Datum *</label>
                    <input 
                        type="date" 
                        id="gigDate" 
                        required
                    >
                </div>

                <div class="modal-form-group">
                    <label for="gigCity">Stadt *</label>
                    <input 
                        type="text" 
                        id="gigCity" 
                        placeholder="z.B. Berlin" 
                        required
                    >
                </div>

                <div class="modal-form-group">
                    <label for="gigVenue">Venue *</label>
                    <input 
                        type="text" 
                        id="gigVenue" 
                        placeholder="z.B. Lido Club" 
                        required
                    >
                </div>

                <div class="modal-form-group">
                    <label for="gigTime">Uhrzeit *</label>
                    <input 
                        type="time" 
                        id="gigTime" 
                        placeholder="HH:MM" 
                        required
                    >
                </div>

                <div class="modal-form-group">
                    <label for="gigInfo">Info (optional)</label>
                    <textarea 
                        id="gigInfo" 
                        placeholder="z.B. Gästeliste, Eintritt, etc."
                    ></textarea>
                </div>

                <div class="modal-actions">
                    <button type="submit" class="save-btn">SPEICHERN</button>
                    <button type="button" class="cancel-btn" id="cancelGigBtn">ABBRECHEN</button>
                </div>
            </form>
        </div>
    </div>

    <!-- DELETE CONFIRM MODAL -->
    <div class="modal-overlay" id="deleteConfirmModal">
        <div class="modal confirm-modal">
            <h2>Gig löschen?</h2>
            <p id="deleteConfirmText">Sind Sie sicher, dass Sie diesen Gig löschen möchten? Diese Aktion kann nicht rückgängig gemacht werden.</p>
            <div class="modal-actions">
                <button type="button" class="delete-confirm-btn" id="confirmDeleteBtn">LÖSCHEN</button>
                <button type="button" class="cancel-btn" id="cancelDeleteBtn">ABBRECHEN</button>
            </div>
        </div>
    </div>

    <script>
        // ============ CONFIG ============
        const CONFIG = {
            ADMIN_PASSWORD: 'spotbust123', // Change this!
            GITHUB_OWNER: '4maggio',
            GITHUB_REPO: 'spotbust',
            GITHUB_BRANCH: 'main',
            STORAGE_TOKEN_KEY: 'spotbust_github_token',
            STORAGE_AUTH_KEY: 'spotbust_authenticated'
        };

        // ============ STATE ============
        let state = {
            authenticated: false,
            githubToken: null,
            gigs: [],
            editingGigIndex: null,
            deletingGigIndex: null
        };

        // ============ DOM ELEMENTS ============
        const loginScreen = document.getElementById('loginScreen');
        const adminScreen = document.getElementById('adminScreen');
        const loginForm = document.getElementById('loginForm');
        const passwordInput = document.getElementById('password');
        const githubTokenInput = document.getElementById('githubToken');
        const loginError = document.getElementById('loginError');
        const logoutBtn = document.getElementById('logoutBtn');
        const addGigBtn = document.getElementById('addGigBtn');
        const gigModal = document.getElementById('gigModal');
        const gigForm = document.getElementById('gigForm');
        const gigModalTitle = document.getElementById('gigModalTitle');
        const gigModalError = document.getElementById('gigModalError');
        const cancelGigBtn = document.getElementById('cancelGigBtn');
        const deleteConfirmModal = document.getElementById('deleteConfirmModal');
        const confirmDeleteBtn = document.getElementById('confirmDeleteBtn');
        const cancelDeleteBtn = document.getElementById('cancelDeleteBtn');
        const gigsTableBody = document.getElementById('gigsTableBody');
        const statusMessage = document.getElementById('statusMessage');

        // ============ FORM INPUTS ============
        const gigDateInput = document.getElementById('gigDate');
        const gigCityInput = document.getElementById('gigCity');
        const gigVenueInput = document.getElementById('gigVenue');
        const gigTimeInput = document.getElementById('gigTime');
        const gigInfoInput = document.getElementById('gigInfo');

        // ============ INITIALIZATION ============
        function init() {
            restoreAuth();
            
            if (state.authenticated) {
                showAdminScreen();
                loadGigs();
            } else {
                showLoginScreen();
            }

            attachEventListeners();
        }

        function attachEventListeners() {
            loginForm.addEventListener('submit', handleLogin);
            logoutBtn.addEventListener('click', handleLogout);
            addGigBtn.addEventListener('click', openAddGigModal);
            gigForm.addEventListener('submit', handleSaveGig);
            cancelGigBtn.addEventListener('click', closeGigModal);
            deleteConfirmModal.addEventListener('click', (e) => {
                if (e.target === deleteConfirmModal) closeDeleteConfirmModal();
            });
            confirmDeleteBtn.addEventListener('click', handleConfirmDelete);
            cancelDeleteBtn.addEventListener('click', closeDeleteConfirmModal);
            gigModal.addEventListener('click', (e) => {
                if (e.target === gigModal) closeGigModal();
            });
        }

        // ============ AUTHENTICATION ============
        function handleLogin(e) {
            e.preventDefault();
            const password = passwordInput.value;
            const token = githubTokenInput.value;

            if (password !== CONFIG.ADMIN_PASSWORD) {
                showLoginError('Falsches Passwort');
                return;
            }

            if (!token.trim()) {
                showLoginError('GitHub Token erforderlich');
                return;
            }

            state.authenticated = true;
            state.githubToken = token;
            localStorage.setItem(CONFIG.STORAGE_AUTH_KEY, 'true');
            localStorage.setItem(CONFIG.STORAGE_TOKEN_KEY, token);

            loginError.classList.remove('show');
            showAdminScreen();
            loadGigs();
        }

        function handleLogout() {
            state.authenticated = false;
            state.githubToken = null;
            state.gigs = [];
            localStorage.removeItem(CONFIG.STORAGE_AUTH_KEY);
            localStorage.removeItem(CONFIG.STORAGE_TOKEN_KEY);
            
            passwordInput.value = '';
            githubTokenInput.value = '';
            
            showLoginScreen();
        }

        function restoreAuth() {
            const authenticated = localStorage.getItem(CONFIG.STORAGE_AUTH_KEY);
            const token = localStorage.getItem(CONFIG.STORAGE_TOKEN_KEY);

            if (authenticated && token) {
                state.authenticated = true;
                state.githubToken = token;
                githubTokenInput.value = token;
            }
        }

        function showLoginError(message) {
            loginError.textContent = message;
            loginError.classList.add('show');
        }

        // ============ SCREEN TRANSITIONS ============
        function showLoginScreen() {
            loginScreen.style.display = 'flex';
            adminScreen.classList.remove('active');
        }

        function showAdminScreen() {
            loginScreen.style.display = 'none';
            adminScreen.classList.add('active');
        }

        // ============ LOAD GIGS ============
        async function loadGigs() {
            try {
                showStatus('Lade Gigs von GitHub...', 'loading');
                
                const url = `https://api.github.com/repos/${CONFIG.GITHUB_OWNER}/${CONFIG.GITHUB_REPO}/contents/gigs.json`;
                const response = await fetch(url, {
                    headers: {
                        'Authorization': `token ${state.githubToken}`,
                        'Accept': 'application/vnd.github.v3.raw'
                    }
                });

                if (!response.ok) {
                    throw new Error(`GitHub API Error: ${response.status}`);
                }

                state.gigs = await response.json();
                state.gigs.sort((a, b) => new Date(a.datum) - new Date(b.datum));
                
                renderGigsTable();
                showStatus('✓ Gigs geladen', 'success', 3000);
            } catch (error) {
                console.error('Load error:', error);
                showStatus(`Fehler beim Laden: ${error.message}`, 'error');
                gigsTableBody.innerHTML = `<tr><td colspan="6" class="empty-message">Fehler beim Laden der Gigs. Token gültig?</td></tr>`;
            }
        }

        // ============ RENDER TABLE ============
        function renderGigsTable() {
            if (state.gigs.length === 0) {
                gigsTableBody.innerHTML = '<tr><td colspan="6" class="empty-message">Keine Gigs vorhanden. Fügen Sie einen neuen Gig hinzu.</td></tr>';
                return;
            }

            gigsTableBody.innerHTML = state.gigs.map((gig, index) => {
                const date = new Date(gig.datum + 'T00:00:00');
                const formattedDate = date.toLocaleDateString('de-DE', { 
                    day: '2-digit', 
                    month: 'short', 
                    year: 'numeric',
                    weekday: 'short'
                }).toUpperCase();

                return `
                    <tr>
                        <td class="date">${formattedDate}</td>
                        <td class="city">${escapeHtml(gig.stadt)}</td>
                        <td class="venue">${escapeHtml(gig.venue)}</td>
                        <td class="time">${gig.uhrzeit}</td>
                        <td>${gig.info ? escapeHtml(gig.info) : '—'}</td>
                        <td>
                            <div class="table-actions">
                                <button class="edit-btn" onclick="openEditGigModal(${index})">EDIT</button>
                                <button class="delete-btn" onclick="openDeleteConfirmModal(${index})">DELETE</button>
                            </div>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        // ============ MODAL OPERATIONS ============
        function openAddGigModal() {
            state.editingGigIndex = null;
            gigModalTitle.textContent = 'Neuer Gig';
            gigForm.reset();
            gigModalError.classList.remove('show');
            gigModal.classList.add('active');
            gigDateInput.focus();
        }

        function openEditGigModal(index) {
            state.editingGigIndex = index;
            const gig = state.gigs[index];
            
            gigModalTitle.textContent = 'Gig bearbeiten';
            gigDateInput.value = gig.datum;
            gigCityInput.value = gig.stadt;
            gigVenueInput.value = gig.venue;
            gigTimeInput.value = gig.uhrzeit;
            gigInfoInput.value = gig.info || '';
            gigModalError.classList.remove('show');
            
            gigModal.classList.add('active');
        }

        function closeGigModal() {
            gigModal.classList.remove('active');
            state.editingGigIndex = null;
            gigForm.reset();
        }

        function openDeleteConfirmModal(index) {
            state.deletingGigIndex = index;
            const gig = state.gigs[index];
            const dateStr = new Date(gig.datum + 'T00:00:00').toLocaleDateString('de-DE', {
                day: '2-digit',
                month: 'long',
                year: 'numeric'
            });
            document.getElementById('deleteConfirmText').textContent = 
                `Wirklich "${escapeHtml(gig.stadt)} – ${escapeHtml(gig.venue)}" (${dateStr}) löschen?`;
            deleteConfirmModal.classList.add('active');
        }

        function closeDeleteConfirmModal() {
            deleteConfirmModal.classList.remove('active');
            state.deletingGigIndex = null;
        }

        // ============ SAVE GIG ============
        async function handleSaveGig(e) {
            e.preventDefault();

            const date = gigDateInput.value;
            const city = gigCityInput.value.trim();
            const venue = gigVenueInput.value.trim();
            const time = gigTimeInput.value;
            const info = gigInfoInput.value.trim();

            // Validation
            if (!date || !city || !venue || !time) {
                showGigModalError('Alle Felder außer "Info" sind erforderlich');
                return;
            }

            const newGig = {
                datum: date,
                stadt: city,
                venue: venue,
                uhrzeit: time
            };

            if (info) {
                newGig.info = info;
            }

            // Update or add
            if (state.editingGigIndex !== null) {
                state.gigs[state.editingGigIndex] = newGig;
            } else {
                state.gigs.push(newGig);
            }

            // Sort by date
            state.gigs.sort((a, b) => new Date(a.datum) - new Date(b.datum));

            // Save to GitHub
            await saveGigsToGitHub();
            
            closeGigModal();
        }

        async function handleConfirmDelete() {
            if (state.deletingGigIndex === null) return;

            state.gigs.splice(state.deletingGigIndex, 1);
            await saveGigsToGitHub();
            
            closeDeleteConfirmModal();
        }

        // ============ SAVE TO GITHUB ============
        async function saveGigsToGitHub() {
            const gigModalTitle = document.getElementById('gigModalTitle');
            const originalSaveBtn = document.querySelector('.save-btn');
            
            try {
                showStatus('Speichere zu GitHub...', 'loading');
                
                // First, get the current file SHA (needed for updates)
                const getUrl = `https://api.github.com/repos/${CONFIG.GITHUB_OWNER}/${CONFIG.GITHUB_REPO}/contents/gigs.json`;
                const getResponse = await fetch(getUrl, {
                    headers: {
                        'Authorization': `token ${state.githubToken}`,
                        'Accept': 'application/vnd.github.v3.json'
                    }
                });

                if (!getResponse.ok) {
                    throw new Error('Konnte aktuelle Datei nicht abrufen');
                }

                const fileData = await getResponse.json();

                // Prepare new content
                const newContent = JSON.stringify(state.gigs, null, 2);
                const encodedContent = btoa(newContent);

                // Update the file
                const putResponse = await fetch(getUrl, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `token ${state.githubToken}`,
                        'Accept': 'application/vnd.github.v3.json',
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        message: `Update gigs via Admin CMS [${new Date().toLocaleString('de-DE')}]`,
                        content: encodedContent,
                        sha: fileData.sha,
                        committer: {
                            name: 'Spotbust Admin',
                            email: 'admin@spotbust.local'
                        }
                    })
                });

                if (!putResponse.ok) {
                    const errorData = await putResponse.json();
                    throw new Error(`GitHub: ${errorData.message || putResponse.statusText}`);
                }

                renderGigsTable();
                showStatus('✓ Erfolgreich zu GitHub übertragen!', 'success', 3000);
            } catch (error) {
                console.error('Save error:', error);
                showGigModalError(`Fehler beim Speichern: ${error.message}`);
                showStatus(`Fehler: ${error.message}`, 'error');
            }
        }

        // ============ UI HELPERS ============
        function showStatus(message, type = 'info', duration = 0) {
            statusMessage.textContent = message;
            statusMessage.className = `status-message ${type}`;
            
            if (duration > 0) {
                setTimeout(() => {
                    statusMessage.classList.add('hidden');
                }, duration);
            }
        }

        function showGigModalError(message) {
            gigModalError.textContent = message;
            gigModalError.classList.add('show');
        }

        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        // ============ START ============
        init();
    </script>
</body>
</html>
